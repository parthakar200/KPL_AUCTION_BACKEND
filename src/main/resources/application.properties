# ─────────────────────────────────────────────────
#  KPL Auction Backend - Application Properties
# ─────────────────────────────────────────────────

spring.application.name=kpl-auction-backend
server.port=8080

# ── H2 In-Memory DB (default / development) ───────
#spring.datasource.url=jdbc:h2:file:./kpl_auction_db;AUTO_SERVER=TRUE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console



spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# ── JPA / Hibernate ────────────────────────────────
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── CORS ───────────────────────────────────────────
# Allow the Vite dev server at port 5173
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

